<!DOCTYPE html>
<html>
<head>
    <title>VerifyAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>
    <div class="logo">
        🛡️ <span>VerifyAI</span>
    </div>

    <div class="tagline">
        AI-Powered Verification
    </div>
</header>


<section class="hero">

    <h1>ECHO <i>AI</i></i></h1>

    <p>
        Ask any question. We'll cross-reference multiple trusted sources
        to provide a factual, verified response.
    </p>

</section>


<div class="search-box">

<form method="POST">

<input type="text" name="question" placeholder="Ask a question..." required>

<button type="submit">🔍</button>

</form>

</div>



{% if answer %}

<div class="result-card">

<div class="verified-title">
✔ VERIFIED ANSWER
</div>

<div class="confidence">
Confidence: {{confidence}}%
</div>

<p class="answer-text">
{{answer}}
</p>

</div>

{% endif %}



</body>
</html>
