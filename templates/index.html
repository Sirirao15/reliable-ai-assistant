<!DOCTYPE html>
<html>
<head>
    <title>VerifyAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="logo">
        ✔ VerifyAI
        <span>AI-POWERED VERIFICATION</span>
    </div>

    <h1>ECHO AI</h1>

    <p class="subtitle">
        Ask any question. We'll cross-reference multiple trusted sources
        to provide a factual, verified response.
    </p>

    <form method="POST" class="search-box">
        <input type="text" name="question" placeholder="Ask anything..." required>
        <button type="submit">🔍</button>
    </form>


    {% if answer %}
    <div class="result">

        <h2>Answer</h2>
        <p>{{answer}}</p>

        <div class="confidence">
            Confidence Score: <b>{{confidence}}%</b>
        </div>

        <div class="feedback">

            <form method="POST" action="/feedback">
                <button name="rating" value="happy">😊 Helpful</button>
                <button name="rating" value="confused">😐 Not Clear</button>
                <button name="rating" value="wrong">❌ Incorrect</button>
            </form>

        </div>

    </div>
    {% endif %}

</div>

</body>
</html>
