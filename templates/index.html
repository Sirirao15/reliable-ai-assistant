<!DOCTYPE html>
<html>
<head>
<title>VerifyAI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>
    <div class="logo">
        ✔ VerifyAI
    </div>
    <div class="tag">
        AI-POWERED VERIFICATION
    </div>
</header>

<div class="hero">

    <h1>Reliable answers, <span>verified.</span></h1>

    <p>
        Ask any question. We'll cross-reference multiple trusted sources
        to provide a factual, verified response.
    </p>

</div>

<div class="search-box">

<form method="POST">

<input type="text" name="question" placeholder="Ask anything..." required>

<button type="submit">🔍</button>

</form>

</div>


{% if answer %}

<div class="result-card">

<div class="result-header">

<div class="verified">
✔ VERIFIED ANSWER
</div>

<div class="confidence">
Confidence {{confidence}}%
</div>

</div>

<p class="answer-text">
{{answer}}
</p>

<form method="POST" action="/feedback" class="feedback">

<button name="rating" value="happy">😊 Helpful</button>
<button name="rating" value="confused">😕 Confusing</button>
<button name="rating" value="wrong">❌ Incorrect</button>

</form>

</div>

{% endif %}

</body>
</html>
